      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand {
      border: 0;

      padding: 0;

      border-radius: 7px;
      background: #17221b;
      color: #f8faf8;

      font-size: .78rem;

      line-height: 1.55;

      pointer-events: none;
    }
    .glossary-term:hover::after,
    .glossary-term:focus::after {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);

    .glossary-term:focus { border-bottom-style: solid; }
    .tooltip-hint {
      margin: -15px 0 25px;

    .source-box { margin-top: 16px; border-top-color: var(--blue); }
    .source-list { display: grid; gap: 9px; }
    .source-list a { color: var(--blue); font-size: .84rem; text-decoration: none; }
    .source-list a:hover { text-decoration: underline; }
    .policy-note { margin-top: 18px; padding: 14px 16px; border: 1px solid var(--line); color: var(--muted); font-size: .78rem; }

    footer { border-top: 1px solid var(--line); padding: 24px 0 34px; color: var(--muted); font-size: .78rem; }
    footer .container { display: flex; justify-content: space-between; gap: 20px; }

    @media (max-width: 820px) {
      .topbar-inner { width: min(100% - 24px, 1180px); gap: 12px; }
      .brand { font-size: 1rem; }
      .keycap { display: none; }
      .container { width: min(100% - 28px, 1120px); }
      .hero { padding-top: 54px; }
      .category-grid { grid-template-columns: 1fr; }
      .category-card { min-height: 215px; }
      .concept-row { grid-template-columns: 1fr auto; }
      .concept-row p { grid-column: 1 / -1; grid-row: 2; }
      .article-layout { grid-template-columns: 1fr; gap: 20px; }
      .aside { position: static; }
      .search-summary { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 520px) {
      .topbar-inner { min-height: 58px; }
      .brand-domain { display: none; }

      .section-heading { align-items: flex-start; flex-direction: column; gap: 5px; }
      .category-card { padding: 21px; }
      .card-route { left: 21px; }
      .question-head, .concept-row { padding-left: 18px; padding-right: 18px; }
      .article { border-left: 0; border-right: 0; border-radius: 0; margin-left: -14px; margin-right: -14px; }
      footer .container { flex-direction: column; }
    }
  </style>
</head>

      ["sle-clinical","SLE 증상과 진단",["lupus symptoms","malar rash","ANA","anti-dsDNA","flare","nephritis"],"symptom",
       "SLE는 피부·관절·신장·혈액 등 여러 장기를 침범하는 이질적 자가면역질환으로, 재발–관해를 반복하며 자가항체와 보체로 진단을 보조한다",
       [["증상 — 다장기",["뺨의 나비모양 발진(malar rash)·광과민성 등 피부 증상","관절통·관절염, 피로, 발열","신장(루푸스 신염)·혈액(빈혈·혈소판감소)·장막(흉막·심막)·신경계 침범 가능","증상이 좋아졌다 나빠지는 재발(flare)–관해를 반복"]],
        ["진단",["antinuclear antibody(ANA) 양성이 선별의 출발점","anti-dsDNA·anti-Sm 같은 특이 자가항체와 저보체혈증(낮은 C3/C4)이 진단을 보조","EULAR/ACR 분류 기준으로 임상·검사 소견을 종합","단일 검사로 확진되지 않아 임상 양상과 함께 판단"]]],
       ["sle-pathogenesis","sle-complement","sle-treatment"]],

      ["sle-treatment","SLE 치료 — 표적치료의 확장",["belimumab","hydroxychloroquine","anifrolumab","molecular subtype"],"treatment",
       "SLE 치료는 오랫동안 면역억제 중심이었으나, B세포·type I interferon을 겨냥하는 표적치료가 더해지며 분자 subtype 기반 환자 선택으로 나아간다",
       [["치료의 축",["hydroxychloroquine이 기본 치료, 활동기에는 글루코코르티코이드·면역억제제를 사용","belimumab(B세포 표적) 등 생물학적 제제가 승인되며 표적치료가 확장","type I interferon 경로를 겨냥하는 약(anifrolumab 등)이 새 옵션으로 추가"]],
        ["분자 subtype으로",["질환 이질성 때문에 모두에게 듣는 단일 치료가 어려움","단일세포·세포타입 유전학이 환자를 분자 subtype으로 나눠 치료 선택을 돕는 방향","C3·C4·anti-dsDNA 등으로 질병 활성도를 추적하며 치료를 조정"]]],
       ["sle-ebv-celltype","sle-clinical","sle-complement"]]
    ];

    const articles = Object.fromEntries(articleRows.map(function (row) {
      return [row[0], {title:row[1],aliases:row[2],section:row[3],summary:row[4],body:row[5],related:row[6]}];
    }));

    const sourceLinks = {};
    const officialSupplementLinks = {
      "sle-clinical":[
        ["NIAMS — Lupus","https://www.niams.nih.gov/health-topics/lupus"]
      ],
      "sle-treatment":[
        ["NIAMS — Lupus: Diagnosis, Treatment","https://www.niams.nih.gov/health-topics/lupus"]
      ]
    };

    const glossaryTerms = {
      "type i interferon":{key:"ifn",definition:"선천면역 cytokine. SLE에서 상승하는 핵심 hallmark 신호."},
      "complement":{key:"complement",definition:"보체. 면역복합체·죽은 세포 잔해 청소를 담당하는 선천면역 시스템."},
      "c4":{key:"c4",definition:"보체 C4 유전자/단백. MHC 안에 있으며 SLE 위험·성차의 분자 원천."},
      "ebv":{key:"ebv",definition:"Epstein–Barr virus. SLE 위험을 크게 높이는 환경 인자."},
      "ebna2":{key:"ebna2",definition:"EBV 단백. SLE 위험 loci 다수를 점유해 gene–environment 상호작용을 시사."},
      "ana":{key:"ana",definition:"Antinuclear antibody. SLE 선별의 출발점이 되는 자가항체."},
      "anti-dsdna":{key:"dsdna",definition:"이중가닥 DNA 자가항체. SLE 특이 진단 보조·활성도 지표."},
      "eqtl":{key:"eqtl",definition:"expression QTL. 유전변이가 유전자 발현에 미치는 효과 — 위험을 세포타입에 귀속."},
      "belimumab":{key:"belimumab",definition:"B세포 생존인자(BAFF)를 표적하는 SLE 생물학적 치료제."}
    };
    const glossaryPattern = /(^|[^A-Za-z0-9])(type I interferon|complement|C4|EBNA2|EBV|ANA|anti-dsDNA|eQTL|belimumab)(?=$|[^A-Za-z0-9])/gi;

    function createAnnotator() {
      const seen = new Set();
      return function (text) {
        return esc(text).replace(glossaryPattern, function (match, prefix, term) {
          const item = glossaryTerms[term.toLowerCase()];
          if (!item || seen.has(item.key)) return match;
          seen.add(item.key);
          return prefix + '<span class="glossary-term" tabindex="0" data-definition="' + esc(item.definition) + '">' + esc(term) + '</span>';
        });
      };
    }

    const app = document.getElementById("app");
    const topSearch = document.getElementById("topSearch");
    let activeFilter = "all";

    function esc(value) {
      return String(value).replace(/[&<>'"]/g, function (c) {
        return {"&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;"}[c];
      });
    }

    function route(hash) {
      window.location.hash = hash;
    }

    function categoryCards() {
      return Object.keys(sections).map(function (key) {
        const s = sections[key];
        return '<button class="category-card" style="--accent:' + s.accent + '" data-section="' + key + '">' +
          '<span class="category-number">' + s.number + ' · ' + s.english + '</span>' +
          '<h3>' + s.title + '</h3><p>' + s.summary + '</p>' +
          '<span class="card-route">질문으로 살펴보기 →</span></button>';
      }).join("");
    }

    function renderHome() {
      document.title = "Systemic Lupus (SLE)";
      app.innerHTML = '<section class="hero"><div class="container">' +
        '<p class="eyebrow">Autoimmune disease knowledge base</p><h1>Systemic Lupus (SLE)</h1>' +
        '<p class="hero-copy">원인(청소 실패·type I IFN·보체·EBV) · 증상·진단(다장기·재발–관해) · 치료(B세포·IFN 표적)</p>' +
        '<form class="hero-search" id="heroSearchForm" role="search"><input id="heroSearch" type="search" aria-label="SLE 통합 검색" placeholder="Search: interferon, C4, EBV, ANA, belimumab"><span class="search-icon">⌕</span></form>' +
        '<p class="search-hint">Korean / English / acronym</p></div></section>' +
        '<section class="browse"><div class="container"><div class="section-heading"><h2>어디서부터 볼까요?</h2><p>원인에서 증상·진단, 치료까지 질문을 따라가 보세요.</p></div>' +
        '<div class="category-grid">' + categoryCards() + '</div></div></section>';
      document.getElementById("heroSearchForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const q = document.getElementById("heroSearch").value.trim();
        if (q) route("search/" + encodeURIComponent(q));
      });
      window.scrollTo(0, 0);
    }

    function renderSection(key) {
      const s = sections[key];
      if (!s) return renderHome();
      document.title = s.title + " · SLE";
      const annotateOnce = createAnnotator();
      const groups = s.groups.map(function (group, i) {
        const items = group.items.map(function (item) {
          const hasPage = Boolean(item[0] && articles[item[0]]);
          return '<div class="concept-row"><strong>' + annotateOnce(item[1]) + '</strong><p>' + annotateOnce(item[2]) + '</p>' +
            (hasPage ? '<button data-article="' + item[0] + '">읽기 →</button>' : '<span class="map-label">개념 지도</span>') + '</div>';
        }).join("");
        return '<section class="question-block"><div class="question-head"><small>QUESTION ' + String(i + 1).padStart(2, "0") + '</small>' +
          '<h2>' + annotateOnce(group.q) + '</h2><p>' + annotateOnce(group.note) + '</p></div><div>' + items + '</div></section>';
      }).join("");
      app.innerHTML = '<div class="container"><nav class="breadcrumb" aria-label="현재 위치"><button data-route="home">홈</button><span>›</span>' + s.title + '</nav>' +
        '<header class="page-header" style="border-top:4px solid ' + s.accent + '"><p class="eyebrow">' + s.number + ' · ' + s.english + '</p><h1>' + s.title + '</h1><p class="lead">' + s.summary + '</p></header>' +
        '<div class="question-list">' + groups + '</div></div>';
      window.scrollTo(0, 0);
    }

    function articleText(a) {
      const bodyText = a.body.map(function (b) { return [b[0]].concat(Array.isArray(b[1]) ? b[1] : [b[1]]).join(" "); });
      return [a.title, a.aliases.join(" "), a.summary].concat(bodyText).join(" ").toLowerCase();
    }

    function highlight(text, query) {
      if (!query) return esc(text);
      const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return esc(text).replace(new RegExp("(" + safe + ")", "ig"), "<mark>$1</mark>");
    }

    function searchArticles(query, filter) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return Object.keys(articles).map(function (id) {
        const a = articles[id];
        if (filter !== "all" && a.section !== filter) return null;
        const hay = articleText(a);
        const pos = hay.indexOf(q);
        if (pos < 0) return null;
        const titleHit = a.title.toLowerCase().includes(q) ? 3 : 0;
        const aliasHit = a.aliases.join(" ").toLowerCase().includes(q) ? 2 : 0;
        return { id: id, article: a, score: titleHit + aliasHit + 1 };
      }).filter(Boolean).sort(function (a, b) { return b.score - a.score || a.article.title.localeCompare(b.article.title); });
    }

    function renderSearch(query) {
      document.title = '"' + query + '" 검색 · SLE';
      const filterButtons = ['<button class="filter-btn ' + (activeFilter === "all" ? "active" : "") + '" data-filter="all">전체</button>'].concat(
        Object.keys(sections).map(function (key) { return '<button class="filter-btn ' + (activeFilter === key ? "active" : "") + '" data-filter="' + key + '">' + sections[key].title + '</button>'; })
      ).join("");
      const found = searchArticles(query, activeFilter);
      const cards = found.length ? found.map(function (r) {
        const s = sections[r.article.section];
        return '<button class="result-card" data-article="' + r.id + '"><span class="result-path">' + s.title + ' › 문서</span>' +
          '<h2>' + highlight(r.article.title, query) + '</h2><p>' + highlight(r.article.summary, query) + '</p></button>';
      }).join("") : '<div class="empty"><strong>No results</strong><br>Try: English / Korean / acronym</div>';
      app.innerHTML = '<div class="container search-page"><nav class="breadcrumb"><button data-route="home">홈</button><span>›</span>검색</nav>' +
        '<header class="page-header"><p class="eyebrow">Search</p><h1>“' + esc(query) + '”</h1></header>' +
        '<div class="search-summary"><p>Public pages · <strong>' + found.length + '</strong></p><div class="filters">' + filterButtons + '</div></div>' +
        '<div class="results">' + cards + '</div></div>';
      topSearch.value = query;
      window.scrollTo(0, 0);
    }

    function getSources(id) {
      return (sourceLinks[id] || []).concat(officialSupplementLinks[id] || []);
    }

    function renderArticle(id) {
      const a = articles[id];
      if (!a) return renderHome();
      const s = sections[a.section];
      const annotateOnce = createAnnotator();
      document.title = a.title + " · SLE";
      const body = a.body.map(function (part) {
        const points = Array.isArray(part[1]) ? part[1] : part[1].replace(/\.\s+/g, ".||| ").split("|||").filter(Boolean);
        return '<section><h2>' + part[0] + '</h2><ul class="fact-list">' + points.map(function (point) { return "<li>" + annotateOnce(point.trim()) + "</li>"; }).join("") + "</ul></section>";
      }).join("");
      const related = a.related.filter(function (rid) { return articles[rid]; }).map(function (rid) {
        return '<button data-article="' + rid + '">' + articles[rid].title + ' →</button>';
      }).join("");
      const sources = getSources(id).map(function (source) {
        return '<a href="' + esc(source[1]) + '" target="_blank" rel="noopener noreferrer">' + esc(source[0]) + ' ↗</a>';
      }).join("");
      app.innerHTML = '<div class="container"><nav class="breadcrumb"><button data-route="home">홈</button><span>›</span><button data-section="' + a.section + '">' + s.title + '</button><span>›</span>' + a.title + '</nav>' +
        '<div class="article-layout"><article class="article"><p class="eyebrow">' + s.title + '</p><h1>' + a.title + '</h1>' +
        '<p class="aliases">Aliases: ' + a.aliases.join(" · ") + '</p><p class="tooltip-hint">점선 용어: hover / focus → 한 줄 설명</p><p class="definition">' + annotateOnce(a.summary) + '</p>' + body + '</article>' +
        '<aside class="aside"><div class="aside-box"><h3>Related</h3><div class="related-list">' + related + '</div></div>' +
        (sources ? '<div class="aside-box source-box"><h3>Resources / External links</h3><div class="source-list">' + sources + '</div></div>' : '') +
        '</aside></div></div>';
      window.scrollTo(0, 0);
    }

    function handleRoute() {
      const raw = window.location.hash.replace(/^#/, "");
      const parts = raw.split("/");
      if (!raw || raw === "home") return renderHome();
      if (parts[0] === "section") return renderSection(parts[1]);
      if (parts[0] === "article") return renderArticle(parts[1]);
      if (parts[0] === "search") return renderSearch(decodeURIComponent(parts.slice(1).join("/")));
      renderHome();
    }

    document.addEventListener("click", function (e) {
      const home = e.target.closest("[data-route='home']");
      const section = e.target.closest("[data-section]");
      const article = e.target.closest("[data-article]");
      const filter = e.target.closest("[data-filter]");
      if (home) route("home");
      else if (article) route("article/" + article.dataset.article);
      else if (section) route("section/" + section.dataset.section);
      else if (filter) { activeFilter = filter.dataset.filter; const q = decodeURIComponent(window.location.hash.split("/").slice(1).join("/")); renderSearch(q); }
    });

    document.getElementById("topSearchForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const q = topSearch.value.trim();
      if (q) { activeFilter = "all"; route("search/" + encodeURIComponent(q)); }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
        e.preventDefault(); topSearch.focus();
      }
    });
    window.addEventListener("hashchange", handleRoute);
    handleRoute();
  </script>
</body>
</html>
