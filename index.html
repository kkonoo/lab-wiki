<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="GWASмҷҖ мң м „н•ҷ к°ңл…җмқ„ лӢЁкі„м ҒмңјлЎң нғҗмғүн•ҳлҠ” Lab Wiki н”„лЎңнҶ нғҖмһ…">
  <title>GWAS Lab Wiki</title>
  <style>
    :root {
      --ink: #18211b;
      --muted: #667168;
      --paper: #f7f7f2;
      --surface: #ffffff;
      --line: #d8ddd7;
      --green: #1f5d43;
      --green-soft: #e7f0ea;
      --blue: #315d78;
      --rust: #94553b;
      --gold: #936f21;
      --shadow: 0 14px 35px rgba(24, 33, 27, .07);
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }
    button, input { font: inherit; }
    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 247, 242, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar-inner {
      width: min(1180px, calc(100% - 40px));
      min-height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand {
      border: 0;
      background: none;
      padding: 0;
      color: var(--ink);
      cursor: pointer;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.18rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .brand span { color: var(--green); }
    .top-search {
      flex: 1;
      max-width: 560px;
      margin-left: auto;
      position: relative;
    }
    .top-search input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      padding: 0 44px 0 14px;
      color: var(--ink);
      outline: none;
    }
    .top-search input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
    .keycap {
      position: absolute;
      right: 10px;
      top: 9px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      background: var(--paper);
      padding: 1px 6px;
      font-size: .75rem;
    }

    main { min-height: calc(100vh - 140px); }
    .container { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }

    .hero {
      padding: 78px 0 52px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(rgba(31, 93, 67, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 93, 67, .035) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--green);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
    }
    h1, h2, h3 { font-family: Georgia, "Noto Serif KR", serif; line-height: 1.25; }
    .hero h1 { margin: 0; font-size: clamp(2.5rem, 6vw, 5rem); letter-spacing: -.045em; }
    .hero-copy { margin: 16px auto 26px; max-width: 650px; color: var(--muted); font-size: 1.04rem; }
    .hero-search { width: min(720px, calc(100% - 32px)); margin: 0 auto; position: relative; }
    .hero-search input {
      width: 100%;
      height: 62px;
      border: 1px solid #bac6bd;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 0 58px 0 20px;
      color: var(--ink);
      font-size: 1.03rem;
      outline: none;
    }
    .hero-search input:focus { border-color: var(--green); box-shadow: 0 0 0 4px var(--green-soft), var(--shadow); }
    .search-icon { position: absolute; right: 20px; top: 18px; color: var(--green); font-size: 1.3rem; }
    .search-hint { margin: 11px 0 0; color: var(--muted); font-size: .82rem; }

    .browse { padding: 58px 0 76px; }
    .section-heading { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    .section-heading h2 { margin: 0; font-size: 1.65rem; }
    .section-heading p { margin: 0; color: var(--muted); font-size: .9rem; }
    .category-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .category-card {
      position: relative;
      min-height: 235px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 26px;
      text-align: left;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .category-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
    .category-card:focus-visible { outline: 3px solid var(--green-soft); outline-offset: 2px; }
    .category-number { color: var(--accent); font-family: Georgia, serif; font-size: .95rem; font-weight: 700; }
    .category-card h3 { margin: 12px 0 10px; font-size: 1.65rem; }
    .category-card p { margin: 0 0 25px; max-width: 520px; color: var(--muted); }
    .card-route { position: absolute; left: 26px; bottom: 23px; color: var(--accent); font-size: .86rem; font-weight: 750; }

    .breadcrumb { padding: 30px 0 18px; color: var(--muted); font-size: .84rem; }
    .breadcrumb button { border: 0; padding: 0; background: none; color: var(--green); cursor: pointer; }
    .breadcrumb span { margin: 0 8px; color: #9ca49e; }
    .page-header { padding: 18px 0 36px; border-bottom: 1px solid var(--line); }
    .page-header h1 { margin: 7px 0 12px; font-size: clamp(2.2rem, 5vw, 4rem); letter-spacing: -.035em; }
    .page-header .lead { margin: 0; max-width: 740px; color: var(--muted); font-size: 1.04rem; }
    .question-list { padding: 42px 0 72px; display: grid; gap: 16px; }
    .question-block { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); overflow: visible; }
    .question-head { padding: 22px 24px 18px; border-bottom: 1px solid var(--line); }
    .question-head small { color: var(--green); font-weight: 800; }
    .question-head h2 { margin: 5px 0 7px; font-size: 1.35rem; }
    .question-head p { margin: 0; color: var(--muted); font-size: .92rem; }
    .concept-row { display: grid; grid-template-columns: 1.2fr 2fr auto; align-items: center; gap: 18px; padding: 17px 24px; border-top: 1px solid #edf0ec; }
    .concept-row:first-child { border-top: 0; }
    .concept-row strong { font-size: .95rem; }
    .concept-row p { margin: 0; color: var(--muted); font-size: .86rem; }
    .concept-row button { border: 0; background: none; color: var(--green); font-weight: 750; cursor: pointer; padding: 5px; }
    .concept-row .map-label { color: #8b948d; font-size: .78rem; white-space: nowrap; }

    .search-page { padding-bottom: 72px; }
    .search-summary { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin: 10px 0 22px; }
    .search-summary p { margin: 0; color: var(--muted); }
    .filters { display: flex; flex-wrap: wrap; gap: 7px; }
    .filter-btn { border: 1px solid var(--line); border-radius: 999px; background: var(--surface); padding: 6px 12px; color: var(--muted); cursor: pointer; font-size: .8rem; }
    .filter-btn.active { border-color: var(--green); background: var(--green-soft); color: var(--green); font-weight: 750; }
    .results { display: grid; gap: 12px; }
    .result-card { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 20px 22px; cursor: pointer; text-align: left; }
    .result-card:hover { border-color: #93aa9a; box-shadow: 0 7px 20px rgba(24, 33, 27, .05); }
    .result-path { color: var(--green); font-size: .76rem; font-weight: 750; }
    .result-card h2 { margin: 4px 0 6px; font-size: 1.25rem; }
    .result-card p { margin: 0; color: var(--muted); font-size: .9rem; }
    mark { background: #fff0ad; color: inherit; padding: 0 2px; }
    .empty { border: 1px dashed #b8c0ba; border-radius: var(--radius); padding: 48px 24px; text-align: center; color: var(--muted); }

    .article-layout { display: grid; grid-template-columns: minmax(0, 740px) 260px; gap: 64px; padding: 12px 0 80px; align-items: start; }
    .article { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: clamp(25px, 5vw, 52px); }
    .article h1 { margin: 6px 0 5px; font-size: clamp(2.1rem, 5vw, 3.5rem); letter-spacing: -.03em; }
    .aliases { margin: 0 0 26px; color: var(--muted); font-size: .83rem; }
    .definition { margin: 0 0 34px; padding: 18px 20px; border-left: 4px solid var(--green); background: var(--green-soft); font-size: 1.03rem; }
    .article h2 { margin: 34px 0 12px; padding-bottom: 7px; border-bottom: 1px solid var(--line); font-size: 1.32rem; }
    .article p { margin: 0 0 15px; }
    .article ul { margin: 0 0 18px; padding-left: 22px; }
    .article li { margin: 6px 0; }
    .fact-list {
      display: grid;
      gap: 9px;
      margin: 0 0 18px;
      padding-left: 20px;
      color: #37423a;
    }
    .fact-list li { padding-left: 4px; }
    .fact-list li::marker { color: var(--green); }
    .term-link { border: 0; border-bottom: 1px solid #8aa897; background: none; padding: 0; color: var(--green); cursor: pointer; font-weight: 700; }
    .glossary-term {
      position: relative;
      border-bottom: 1px dotted var(--green);
      color: #174b37;
      cursor: help;
      outline: none;
    }
    .glossary-term::after {
      content: attr(data-definition);
      position: absolute;
      z-index: 40;
      left: 0;
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: min(320px, calc(100vw - 40px));
      padding: 10px 12px;
      border-radius: 7px;
      background: #17221b;
      color: #f8faf8;
      box-shadow: 0 10px 28px rgba(10, 20, 14, .24);
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-size: .78rem;
      font-weight: 500;
      line-height: 1.55;
      letter-spacing: 0;
      white-space: normal;
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: opacity .14s ease, transform .14s ease, visibility .14s ease;
      pointer-events: none;
    }
    .glossary-term:hover::after,
    .glossary-term:focus::after {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .glossary-term:focus { border-bottom-style: solid; }
    .tooltip-hint {
      margin: -15px 0 25px;
      color: var(--muted);
      font-size: .76rem;
    }
    .aside { position: sticky; top: 88px; }
    .aside-box { border-top: 3px solid var(--green); background: var(--surface); padding: 18px; box-shadow: 0 8px 24px rgba(24,33,27,.05); }
    .aside-box h3 { margin: 0 0 12px; font-size: 1rem; }
    .related-list { display: grid; gap: 9px; }
    .related-list button { border: 0; background: none; padding: 0; text-align: left; color: var(--green); cursor: pointer; font-size: .87rem; }
    .policy-note { margin-top: 18px; padding: 14px 16px; border: 1px solid var(--line); color: var(--muted); font-size: .78rem; }

    footer { border-top: 1px solid var(--line); padding: 24px 0 34px; color: var(--muted); font-size: .78rem; }
    footer .container { display: flex; justify-content: space-between; gap: 20px; }

    @media (max-width: 820px) {
      .topbar-inner { width: min(100% - 24px, 1180px); gap: 12px; }
      .brand { font-size: 1rem; }
      .keycap { display: none; }
      .container { width: min(100% - 28px, 1120px); }
      .hero { padding-top: 54px; }
      .category-grid { grid-template-columns: 1fr; }
      .category-card { min-height: 215px; }
      .concept-row { grid-template-columns: 1fr auto; }
      .concept-row p { grid-column: 1 / -1; grid-row: 2; }
      .article-layout { grid-template-columns: 1fr; gap: 20px; }
      .aside { position: static; }
      .search-summary { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 520px) {
      .topbar-inner { min-height: 58px; }
      .brand span { display: none; }
      .top-search input { height: 38px; }
      .hero h1 { font-size: 2.55rem; }
      .hero-search input { height: 56px; }
      .section-heading { align-items: flex-start; flex-direction: column; gap: 5px; }
      .category-card { padding: 21px; }
      .card-route { left: 21px; }
      .question-head, .concept-row { padding-left: 18px; padding-right: 18px; }
      .article { border-left: 0; border-right: 0; border-radius: 0; margin-left: -14px; margin-right: -14px; }
      footer .container { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <button class="brand" type="button" data-route="home">Lab Wiki <span>/ GWAS</span></button>
      <form class="top-search" id="topSearchForm" role="search">
        <input id="topSearch" type="search" aria-label="мң„нӮӨ кІҖмғү" placeholder="Search term / acronym">
        <span class="keycap">/</span>
      </form>
    </div>
  </header>

  <main id="app" tabindex="-1"></main>

  <footer>
    <div class="container">
      <span>GWAS Lab Wiki В· Public knowledge В· Standard methods</span>
      <span>Excluded: Project В· Hypothesis В· Internal result</span>
    </div>
  </footer>

  <script>
    const sections = {
      genetics: {
        number: "01", title: "Genetics Basics", english: "FOUNDATION", accent: "#1f5d43",
        summary: "Genetic variant В· Genotype В· Population м°ЁмқҙлҠ” GWASм—җ м–ҙл–Ө мҳҒн–Ҙмқ„ мЈјлҠ”к°Җ? В· Imputation",
        groups: [
          { q: "Genetic variantлҠ” л¬ҙм—Үмқҙкі  м–ҙл–»кІҢ н‘ңнҳ„лҗҳлҠ”к°Җ?", note: "DNA sequence вҶ’ allele вҶ’ genotype", items: [
            ["variant", "Genetic variant & SNP", "DNA sequence difference В· common variant unit"],
            ["allele", "Allele", "Alternative sequence at one genetic locus"],
            ["genotype", "Genotype & dosage", "Allele combination В· probabilistic representation"]
          ]},
          { q: "к°Җк№Ңмҡҙ variantл“ӨмқҖ мҷң н•Ёк»ҳ мӣҖм§ҒмқҙлҠ”к°Җ?", note: "Chromosome position вҶ’ LD вҶ’ haplotype", items: [
            ["ld", "Linkage disequilibrium", "Non-random association between alleles"],
            ["haplotype", "Haplotype", "Allele combination inherited on one chromosome"]
          ]},
          { q: "Population м°ЁмқҙлҠ” GWASм—җ м–ҙл–Ө мҳҒн–Ҙмқ„ мЈјлҠ”к°Җ?", note: "Allele frequency вҶ’ ancestry вҶ’ population structure", items: [
            ["maf", "Minor allele frequency", "Frequency of the less common allele"],
            ["ancestry", "Ancestry & population structure", "Systematic genetic differences between populations"]
          ]},
          { q: "Genotype dataлҠ” м–ҙл–»кІҢ л§Ңл“Өкі  ліҙмҷ„н•ҳлҠ”к°Җ?", note: "Genotyping / sequencing вҶ’ imputation", items: [
            ["genotyping", "Genotyping & sequencing", "Direct measurement of genetic variation"],
            ["imputation", "Genotype imputation", "Inference with a reference panel"]
          ]}
        ]
      },
      gwas: {
        number: "02", title: "GWAS", english: "ASSOCIATION", accent: "#315d78",
        summary: "Study design В· QC В· Association test В· Result interpretation",
        groups: [
          { q: "GWASлҠ” л¬ҙм—Үмқ„ л№„көҗн•ҳлҠ”к°Җ?", note: "Genetic variantмҷҖ phenotypeмқҳ statistical association", items: [
            ["gwas", "Genome-wide association study", "Genome-wide variantвҖ“trait association"],
            ["phenotype", "Phenotype & study design", "Binary / quantitative trait В· cohort design"]
          ]},
          { q: "Association test м „м—җ л¬ҙм—Үмқ„ нҷ•мқён•ҙм•ј н•ҳлҠ”к°Җ?", note: "Sample / variant QC вҶ’ covariate м„Өм •", items: [
            ["qc", "Sample & variant QC", "Missingness В· frequency В· heterozygosity"],
            ["covariates", "Covariate & principal components", "Non-genetic factors В· population structure"]
          ]},
          { q: "AssociationмқҖ м–ҙл–»кІҢ кІҖм •н•ҳлҠ”к°Җ?", note: "Regression model вҶ’ effect size вҶ’ multiple testing", items: [
            ["association-model", "Association model", "Statistical model matched to trait type"],
            ["significance", "Genome-wide significance", "Threshold for large-scale multiple testing"]
          ]},
          { q: "GWAS кІ°кіјлҠ” м–ҙл–»кІҢ мқҪлҠ”к°Җ?", note: "Manhattan plot В· QQ plot В· summary statistics", items: [
            ["manhattan", "Manhattan plot", "Association signal by genomic position"],
            ["qq-plot", "QQ plot", "Observed vs. expected test statistics"],
            ["sumstats", "GWAS summary statistics", "Variant-level effect size and test result"]
          ]}
        ]
      },
      postgwas: {
        number: "03", title: "Post-GWAS", english: "INTERPRETATION", accent: "#94553b",
        summary: "Locus В· Fine-mapping В· Variant-to-gene В· Causal inference",
        groups: [
          { q: "Association signalмқҳ лІ”мң„лҠ” м–ҙл–»кІҢ м •н•ҳлҠ”к°Җ?", note: "Lead variant вҶ’ conditional analysis вҶ’ fine-mapping", items: [
            ["locus-lead", "Locus & lead variant", "Representative variant В· surrounding region"],
            ["conditional", "Conditional analysis", "Independent signal after conditioning"],
            ["fine-mapping", "Fine-mapping", "Probabilistic ranking of causal candidates"]
          ]},
          { q: "VariantлҘј functionкіј geneм—җ м–ҙл–»кІҢ м—°кІ°н•ҳлҠ”к°Җ?", note: "Annotation вҶ’ variant-to-gene вҶ’ colocalization", items: [
            ["functional-annotation", "Functional annotation", "Genomic location В· predicted function"],
            ["variant-to-gene", "Variant-to-gene mapping", "Distance В· regulation В· QTL evidence"],
            ["coloc", "Colocalization", "Shared causal variant between two signals"]
          ]},
          { q: "Gene-level associationкіј causalityлҠ” м–ҙл–»кІҢ кө¬л¶„н•ҳлҠ”к°Җ?", note: "TWASмҷҖ Mendelian randomizationмқҳ м§Ҳл¬ё м°Ёмқҙ", items: [
            ["twas", "TWAS", "Predicted gene expressionвҖ“trait association"],
            ["mr", "Mendelian randomization", "Causal inference with genetic instruments"]
          ]},
          { q: "TraitмҷҖ individual levelлЎң м–ҙл–»кІҢ нҷ•мһҘн•ҳлҠ”к°Җ?", note: "Genetic correlation вҶ’ polygenic risk score", items: [
            ["genetic-correlation", "Genetic correlation", "Shared genetic effects between traits"],
            ["prs", "Polygenic risk score", "Individual score from multiple variant effects"]
          ]}
        ]
      },
      tools: {
        number: "04", title: "Tools / Databases", english: "RESOURCES", accent: "#936f21",
        summary: "QC В· Association В· Reference panel В· Public summary statistics",
        groups: [
          { q: "Genotype QCмҷҖ preprocessingм—җлҠ” л¬ҙм—Үмқ„ м“°лҠ”к°Җ?", note: "Format conversion В· filtering В· LD В· PCA", items: [
            ["plink", "PLINK", "General-purpose genotype QC and analysis"]
          ]},
          { q: "GWAS dataмҷҖ summary statisticsлҠ” м–ҙл””м„ң м°ҫлҠ”к°Җ?", note: "Study metadata В· association В· full summary statistics", items: [
            ["gwas-catalog", "GWAS Catalog", "Curated published GWAS resource"],
            ["opengwas", "OpenGWAS", "Programmatic GWAS summary statistics resource"]
          ]},
          { q: "LDмҷҖ reference м •ліҙлҠ” м–ҙл””м„ң нҷ•мқён•ҳлҠ”к°Җ?", note: "Reference panel В· variant ID В· population-specific LD", items: [
            ["1000-genomes", "1000 Genomes Project", "Population genetic variation reference"],
            ["dbsnp-ldlink", "dbSNP & LDlink", "Variant identifier В· population-specific LD"]
          ]},
          { q: "VariantмҷҖ molecular traitлҠ” м–ҙл””м„ң м—°кІ°н•ҳлҠ”к°Җ?", note: "Tissue-specific QTL В· regulatory annotation", items: [
            ["gtex", "GTEx", "Tissue-specific gene expression and eQTL"],
            ["annotation-resources", "Functional annotation resources", "Genomic location В· regulatory function"]
          ]}
        ]
      }
    };

    const articles = {
      variant: {
        title: "Genetic variant & SNP", aliases: ["genetic variant", "SNP", "single nucleotide polymorphism", "мң м „ліҖмқҙ"], section: "genetics",
        summary: "Reference sequenceмҷҖ лӢӨлҘё DNA position лҳҗлҠ” sequence; SNPлҠ” single-nucleotide variant",
        body: [
          [
                    "Core question",
                    [
                              "Genome-wide genetic variantмҷҖ phenotype мӮ¬мқҙмқҳ statistical association нғҗмғү",
                              "Phenotype: disease status к°ҷмқҖ binary trait лҳҗлҠ” heightВ·blood pressure к°ҷмқҖ quantitative trait",
                              "кё°ліё output: variantлі„ effect size В· standard error В· p-value"
                    ]
          ],
          [
                    "Workflow",
                    [
                              "Phenotypeкіј covariate м •мқҳ вҶ’ sample / variant QC вҶ’ genotype imputation",
                              "Trait typeкіј sample structureм—җ л§һлҠ” association model м„ нғқ",
                              "Population structure В· relatedness В· batch effect л“ұ potential confounder мЎ°м •"
                    ]
          ],
          [
                    "Interpretation",
                    [
                              "Small p-value: null modelкіј мһҳ л§һм§Җ м•ҠлҠ” association; biological importanceмҷҖ лҸҷмқјн•ҳм§Җ м•ҠмқҢ",
                              "Association вү  causality; causal variantВ·geneВ·mechanismмқҖ Post-GWAS analysisк°Җ н•„мҡ”",
                              "Effect size В· allele frequency В· ancestry В· replicationмқ„ н•Ёк»ҳ нҷ•мқё"
                    ]
          ]
], related: ["ld", "gwas", "sumstats"]

    const glossaryTerms = {
      "genetic variant": { key: "variant", definition: "Reference sequenceмҷҖ лӢӨлҘё DNA position лҳҗлҠ” sequence." },
      "variant": { key: "variant", definition: "Reference sequenceмҷҖ лӢӨлҘё DNA position лҳҗлҠ” sequence." },
      "snp": { key: "snp", definition: "Single nucleotide positionм—җм„ң лӮҳнғҖлӮҳлҠ” genetic variant." },
      "allele": { key: "allele", definition: "н•ҳлӮҳмқҳ locusм—җм„ң к°ҖлҠҘн•ң м„ңлЎң лӢӨлҘё sequence form." },
      "alleles": { key: "allele", definition: "н•ҳлӮҳмқҳ locusм—җм„ң к°ҖлҠҘн•ң м„ңлЎң лӢӨлҘё sequence form." },
      "genotype": { key: "genotype", definition: "Individualмқҙ ліҙмң н•ң allele combination лҳҗлҠ” allele count." },
      "phenotype": { key: "phenotype", definition: "GWASм—җм„ң л¶„м„қн•ҳлҠ” кҙҖм°° к°ҖлҠҘн•ң trait лҳҗлҠ” disease status." },
      "locus": { key: "locus", definition: "GenomeмғҒмқҳ нҠ№м • position лҳҗлҠ” genomic region." },
      "loci": { key: "locus", definition: "GenomeмғҒмқҳ нҠ№м • position лҳҗлҠ” genomic region." },
      "ld": { key: "ld", definition: "м„ңлЎң лӢӨлҘё variantк°Җ populationм—җм„ң non-randomн•ҳкІҢ н•Ёк»ҳ лӮҳнғҖлӮҳлҠ” pattern." },
      "ancestry": { key: "ancestry", definition: "Shared genetic backgroundлҘј л°ҳмҳҒн•ҳлҠ” population structure." },
      "association": { key: "association", definition: "VariantмҷҖ phenotype мӮ¬мқҙмқҳ statistical relationship; causalityмҷҖлҠ” кө¬л¶„." },
      "effect size": { key: "effect-size", definition: "Associationмқҳ directionкіј magnitude; мЈјлЎң beta лҳҗлҠ” ORлЎң н‘ңмӢң." },
      "p-value": { key: "p-value", definition: "Null modelм—җм„ң нҳ„мһ¬ліҙлӢӨ к·№лӢЁм Ғмқё resultк°Җ лӮҳмҳ¬ probability." },
      "summary statistics": { key: "summary-statistics", definition: "Variantлі„ effect size, SE, p-value л“ұмқ„ лӢҙмқҖ result table." },
      "summary stats": { key: "summary-statistics", definition: "Variantлі„ effect size, SE, p-value л“ұмқ„ лӢҙмқҖ result table." },
      "genome build": { key: "genome-build", definition: "Genomic positionмқҳ кё°мӨҖмқҙ лҗҳлҠ” reference genome version." },
      "reference panel": { key: "reference-panel", definition: "Imputation лҳҗлҠ” LD кі„мӮ°м—җ мӮ¬мҡ©н•ҳлҠ” reference genotype dataset." },
      "causal variant": { key: "causal-variant", definition: "Phenotype ліҖнҷ”м—җ м§Ғм ‘ кҙҖм—¬н•ңлӢӨкі  м¶”м •лҗҳлҠ” genetic variant." }
    };
    const glossaryPattern = /(^|[^A-Za-z0-9])(summary statistics|summary stats|genetic variant|causal variant|reference panel|genome build|effect size|association|phenotype|genotype|ancestry|alleles?|p-value|variant|locus|loci|SNP|LD)(?=$|[^A-Za-z0-9])/gi;

    function createAnnotator() {
      const seen = new Set();
      return function (text) {
        return esc(text).replace(glossaryPattern, function (match, prefix, term) {
          const item = glossaryTerms[term.toLowerCase()];
          if (!item || seen.has(item.key)) return match;
          seen.add(item.key);
          return prefix + '<span class="glossary-term" tabindex="0" data-definition="' + esc(item.definition) + '">' + esc(term) + '</span>';
        });
      };
    }

    const app = document.getElementById("app");
    const topSearch = document.getElementById("topSearch");
    let activeFilter = "all";

    function esc(value) {
      return String(value).replace(/[&<>'"]/g, function (c) {
        return {"&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;"}[c];
      });
    }

    function route(hash) {
      window.location.hash = hash;
    }

    function categoryCards() {
      return Object.keys(sections).map(function (key) {
        const s = sections[key];
        return '<button class="category-card" style="--accent:' + s.accent + '" data-section="' + key + '">' +
          '<span class="category-number">' + s.number + ' В· ' + s.english + '</span>' +
          '<h3>' + s.title + '</h3><p>' + s.summary + '</p>' +
          '<span class="card-route">м§Ҳл¬ёмңјлЎң мӮҙнҺҙліҙкё° вҶ’</span></button>';
      }).join("");
    }

    function renderHome() {
      document.title = "GWAS Lab Wiki";
      app.innerHTML = '<section class="hero"><div class="container">' +
        '<p class="eyebrow">Genetics knowledge base</p><h1>GWAS Lab Wiki</h1>' +
        '<p class="hero-copy">Genetics В· GWAS В· Post-GWAS В· Resources</p>' +
        '<form class="hero-search" id="heroSearchForm" role="search"><input id="heroSearch" type="search" aria-label="GWAS мң„нӮӨ нҶөн•© кІҖмғү" placeholder="Search: LD, linkage disequilibrium, summary statistics"><span class="search-icon">вҢ•</span></form>' +
        '<p class="search-hint">Korean / English / acronym</p></div></section>' +
        '<section class="browse"><div class="container"><div class="section-heading"><h2>м–ҙл””м„ңл¶Җн„° ліјк№Ңмҡ”?</h2><p>м§Ҳл¬ёмқ„ л”°лқј нҒ° кө¬мЎ°л¶Җн„° мӮҙнҺҙліҙм„ёмҡ”.</p></div>' +
        '<div class="category-grid">' + categoryCards() + '</div></div></section>';
      document.getElementById("heroSearchForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const q = document.getElementById("heroSearch").value.trim();
        if (q) route("search/" + encodeURIComponent(q));
      });
      window.scrollTo(0, 0);
    }

    function renderSection(key) {
      const s = sections[key];
      if (!s) return renderHome();
      document.title = s.title + " В· GWAS Lab Wiki";
      const annotateOnce = createAnnotator();
      const groups = s.groups.map(function (group, i) {
        const items = group.items.map(function (item) {
          const hasPage = Boolean(item[0] && articles[item[0]]);
          return '<div class="concept-row"><strong>' + annotateOnce(item[1]) + '</strong><p>' + annotateOnce(item[2]) + '</p>' +
            (hasPage ? '<button data-article="' + item[0] + '">мқҪкё° вҶ’</button>' : '<span class="map-label">к°ңл…җ м§ҖлҸ„</span>') + '</div>';
        }).join("");
        return '<section class="question-block"><div class="question-head"><small>QUESTION ' + String(i + 1).padStart(2, "0") + '</small>' +
          '<h2>' + annotateOnce(group.q) + '</h2><p>' + annotateOnce(group.note) + '</p></div><div>' + items + '</div></section>';
      }).join("");
      app.innerHTML = '<div class="container"><nav class="breadcrumb" aria-label="нҳ„мһ¬ мң„м№ҳ"><button data-route="home">нҷҲ</button><span>вҖә</span>' + s.title + '</nav>' +
        '<header class="page-header" style="border-top:4px solid ' + s.accent + '"><p class="eyebrow">' + s.number + ' В· ' + s.english + '</p><h1>' + s.title + '</h1><p class="lead">' + s.summary + '</p></header>' +
        '<div class="question-list">' + groups + '</div></div>';
      window.scrollTo(0, 0);
    }

    function articleText(a) {
      const bodyText = a.body.map(function (b) { return [b[0]].concat(Array.isArray(b[1]) ? b[1] : [b[1]]).join(" "); });
      return [a.title, a.aliases.join(" "), a.summary].concat(bodyText).join(" ").toLowerCase();
    }

    function highlight(text, query) {
      if (!query) return esc(text);
      const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return esc(text).replace(new RegExp("(" + safe + ")", "ig"), "<mark>$1</mark>");
    }

    function searchArticles(query, filter) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return Object.keys(articles).map(function (id) {
        const a = articles[id];
        if (filter !== "all" && a.section !== filter) return null;
        const hay = articleText(a);
        const pos = hay.indexOf(q);
        if (pos < 0) return null;
        const titleHit = a.title.toLowerCase().includes(q) ? 3 : 0;
        const aliasHit = a.aliases.join(" ").toLowerCase().includes(q) ? 2 : 0;
        return { id: id, article: a, score: titleHit + aliasHit + 1 };
      }).filter(Boolean).sort(function (a, b) { return b.score - a.score || a.article.title.localeCompare(b.article.title); });
    }

    function renderSearch(query) {
      document.title = '"' + query + '" кІҖмғү В· GWAS Lab Wiki';
      const filterButtons = ['<button class="filter-btn ' + (activeFilter === "all" ? "active" : "") + '" data-filter="all">м „мІҙ</button>'].concat(
        Object.keys(sections).map(function (key) { return '<button class="filter-btn ' + (activeFilter === key ? "active" : "") + '" data-filter="' + key + '">' + sections[key].title + '</button>'; })
      ).join("");
      const found = searchArticles(query, activeFilter);
      const cards = found.length ? found.map(function (r) {
        const s = sections[r.article.section];
        return '<button class="result-card" data-article="' + r.id + '"><span class="result-path">' + s.title + ' вҖә л¬ём„ң</span>' +
          '<h2>' + highlight(r.article.title, query) + '</h2><p>' + highlight(r.article.summary, query) + '</p></button>';
      }).join("") : '<div class="empty"><strong>No results</strong><br>Try: English / Korean / acronym</div>';
      app.innerHTML = '<div class="container search-page"><nav class="breadcrumb"><button data-route="home">нҷҲ</button><span>вҖә</span>кІҖмғү</nav>' +
        '<header class="page-header"><p class="eyebrow">Search</p><h1>вҖң' + esc(query) + 'вҖқ</h1></header>' +
        '<div class="search-summary"><p>Public pages В· <strong>' + found.length + '</strong></p><div class="filters">' + filterButtons + '</div></div>' +
        '<div class="results">' + cards + '</div></div>';
      topSearch.value = query;
      window.scrollTo(0, 0);
    }

    function renderArticle(id) {
      const a = articles[id];
      if (!a) return renderHome();
      const s = sections[a.section];
      const annotateOnce = createAnnotator();
      document.title = a.title + " В· GWAS Lab Wiki";
      const body = a.body.map(function (part) {
        const points = Array.isArray(part[1]) ? part[1] : part[1].replace(/\.\s+/g, ".||| ").split("|||").filter(Boolean);
        return '<section><h2>' + part[0] + '</h2><ul class="fact-list">' + points.map(function (point) { return "<li>" + annotateOnce(point.trim()) + "</li>"; }).join("") + "</ul></section>";
      }).join("");
      const related = a.related.filter(function (rid) { return articles[rid]; }).map(function (rid) {
        return '<button data-article="' + rid + '">' + articles[rid].title + ' вҶ’</button>';
      }).join("");
      app.innerHTML = '<div class="container"><nav class="breadcrumb"><button data-route="home">нҷҲ</button><span>вҖә</span><button data-section="' + a.section + '">' + s.title + '</button><span>вҖә</span>' + a.title + '</nav>' +
        '<div class="article-layout"><article class="article"><p class="eyebrow">' + s.title + '</p><h1>' + a.title + '</h1>' +
        '<p class="aliases">Aliases: ' + a.aliases.join(" В· ") + '</p><p class="tooltip-hint">м җм„  мҡ©м–ҙ: hover / focus вҶ’ н•ң мӨ„ м„ӨлӘ…</p><p class="definition">' + annotateOnce(a.summary) + '</p>' + body + '</article>' +
        '<aside class="aside"><div class="aside-box"><h3>Related</h3><div class="related-list">' + related + '</div></div>' +
        '<div class="policy-note">Public concepts В· Standard methods<br>Excluded: Project В· Hypothesis В· Internal result</div></aside></div></div>';
      window.scrollTo(0, 0);
    }

    function handleRoute() {
      const raw = window.location.hash.replace(/^#/, "");
      const parts = raw.split("/");
      if (!raw || raw === "home") return renderHome();
      if (parts[0] === "section") return renderSection(parts[1]);
      if (parts[0] === "article") return renderArticle(parts[1]);
      if (parts[0] === "search") return renderSearch(decodeURIComponent(parts.slice(1).join("/")));
      renderHome();
    }

    document.addEventListener("click", function (e) {
      const home = e.target.closest("[data-route='home']");
      const section = e.target.closest("[data-section]");
      const article = e.target.closest("[data-article]");
      const filter = e.target.closest("[data-filter]");
      if (home) route("home");
      else if (article) route("article/" + article.dataset.article);
      else if (section) route("section/" + section.dataset.section);
      else if (filter) { activeFilter = filter.dataset.filter; const q = decodeURIComponent(window.location.hash.split("/").slice(1).join("/")); renderSearch(q); }
    });

    document.getElementById("topSearchForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const q = topSearch.value.trim();
      if (q) { activeFilter = "all"; route("search/" + encodeURIComponent(q)); }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
        e.preventDefault(); topSearch.focus();
      }
    });
    window.addEventListener("hashchange", handleRoute);
    handleRoute();
  </script>
