<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Single-cell Epigenomics를 measurement·QC·regulation·tool의 질문으로 탐색하는 HaLab Wiki">
  <title>Single-cell Epigenomics · HaLab Wiki</title>
  <style>
    :root {
      --ink: #18211b;
      --muted: #667168;
      --paper: #f7f7f2;
      --surface: #ffffff;
      --line: #d8ddd7;
      --green: #1f5d43;
      --green-soft: #e7f0ea;
      --blue: #315d78;
      --rust: #94553b;
      --gold: #936f21;
      --shadow: 0 14px 35px rgba(24, 33, 27, .07);
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }
    button, input { font: inherit; }
    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 247, 242, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .topbar-inner {
      width: min(1180px, calc(100% - 40px));
      min-height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand {
      border: 0;
      background: none;
      padding: 0;
      color: var(--ink);
      cursor: pointer;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.18rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .brand span { color: var(--green); }
    .brand-group { display: flex; align-items: center; white-space: nowrap; }
    .brand-home { text-decoration: none; }
    .brand-domain { margin-left: 6px; text-decoration: none; }
    .top-search {
      flex: 1;
      max-width: 560px;
      margin-left: auto;
      position: relative;
    }
    .top-search input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      padding: 0 44px 0 14px;
      color: var(--ink);
      outline: none;
    }
    .top-search input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
    .keycap {
      position: absolute;
      right: 10px;
      top: 9px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      background: var(--paper);
      padding: 1px 6px;
      font-size: .75rem;
    }

    main { min-height: calc(100vh - 140px); }
    .container { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }

    .hero {
      padding: 78px 0 52px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(rgba(31, 93, 67, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 93, 67, .035) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--green);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
    }
    h1, h2, h3 { font-family: Georgia, "Noto Serif KR", serif; line-height: 1.25; }
    .hero h1 { margin: 0; font-size: clamp(2.5rem, 6vw, 5rem); letter-spacing: -.045em; }
    .hero-copy { margin: 16px auto 26px; max-width: 650px; color: var(--muted); font-size: 1.04rem; }
    .hero-search { width: min(720px, calc(100% - 32px)); margin: 0 auto; position: relative; }
    .hero-search input {
      width: 100%;
      height: 62px;
      border: 1px solid #bac6bd;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 0 58px 0 20px;
      color: var(--ink);
      font-size: 1.03rem;
      outline: none;
    }
    .hero-search input:focus { border-color: var(--green); box-shadow: 0 0 0 4px var(--green-soft), var(--shadow); }
    .search-icon { position: absolute; right: 20px; top: 18px; color: var(--green); font-size: 1.3rem; }
    .search-hint { margin: 11px 0 0; color: var(--muted); font-size: .82rem; }

    .browse { padding: 58px 0 76px; }
    .section-heading { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    .section-heading h2 { margin: 0; font-size: 1.65rem; }
    .section-heading p { margin: 0; color: var(--muted); font-size: .9rem; }
    .category-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .category-card {
      position: relative;
      min-height: 235px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 26px;
      text-align: left;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .category-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
    .category-card:focus-visible { outline: 3px solid var(--green-soft); outline-offset: 2px; }
    .category-number { color: var(--accent); font-family: Georgia, serif; font-size: .95rem; font-weight: 700; }
    .category-card h3 { margin: 12px 0 10px; font-size: 1.65rem; }
    .category-card p { margin: 0 0 25px; max-width: 520px; color: var(--muted); }
    .card-route { position: absolute; left: 26px; bottom: 23px; color: var(--accent); font-size: .86rem; font-weight: 750; }

    .breadcrumb { padding: 30px 0 18px; color: var(--muted); font-size: .84rem; }
    .breadcrumb button { border: 0; padding: 0; background: none; color: var(--green); cursor: pointer; }
    .breadcrumb span { margin: 0 8px; color: #9ca49e; }
    .page-header { padding: 18px 0 36px; border-bottom: 1px solid var(--line); }
    .page-header h1 { margin: 7px 0 12px; font-size: clamp(2.2rem, 5vw, 4rem); letter-spacing: -.035em; }
    .page-header .lead { margin: 0; max-width: 740px; color: var(--muted); font-size: 1.04rem; }
    .question-list { padding: 42px 0 72px; display: grid; gap: 16px; }
    .question-block { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); overflow: visible; }
    .question-head { padding: 22px 24px 18px; border-bottom: 1px solid var(--line); }
    .question-head small { color: var(--green); font-weight: 800; }
    .question-head h2 { margin: 5px 0 7px; font-size: 1.35rem; }
    .question-head p { margin: 0; color: var(--muted); font-size: .92rem; }
    .concept-row { display: grid; grid-template-columns: 1.2fr 2fr auto; align-items: center; gap: 18px; padding: 17px 24px; border-top: 1px solid #edf0ec; }
    .concept-row:first-child { border-top: 0; }
    .concept-row strong { font-size: .95rem; }
    .concept-row p { margin: 0; color: var(--muted); font-size: .86rem; }
    .concept-row button { border: 0; background: none; color: var(--green); font-weight: 750; cursor: pointer; padding: 5px; }
    .concept-row .map-label { color: #8b948d; font-size: .78rem; white-space: nowrap; }

    .search-page { padding-bottom: 72px; }
    .search-summary { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin: 10px 0 22px; }
    .search-summary p { margin: 0; color: var(--muted); }
    .filters { display: flex; flex-wrap: wrap; gap: 7px; }
    .filter-btn { border: 1px solid var(--line); border-radius: 999px; background: var(--surface); padding: 6px 12px; color: var(--muted); cursor: pointer; font-size: .8rem; }
    .filter-btn.active { border-color: var(--green); background: var(--green-soft); color: var(--green); font-weight: 750; }
    .results { display: grid; gap: 12px; }
    .result-card { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 20px 22px; cursor: pointer; text-align: left; }
    .result-card:hover { border-color: #93aa9a; box-shadow: 0 7px 20px rgba(24, 33, 27, .05); }
    .result-path { color: var(--green); font-size: .76rem; font-weight: 750; }
    .result-card h2 { margin: 4px 0 6px; font-size: 1.25rem; }
    .result-card p { margin: 0; color: var(--muted); font-size: .9rem; }
    mark { background: #fff0ad; color: inherit; padding: 0 2px; }
    .empty { border: 1px dashed #b8c0ba; border-radius: var(--radius); padding: 48px 24px; text-align: center; color: var(--muted); }

    .article-layout { display: grid; grid-template-columns: minmax(0, 740px) 260px; gap: 64px; padding: 12px 0 80px; align-items: start; }
    .article { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: clamp(25px, 5vw, 52px); }
    .article h1 { margin: 6px 0 5px; font-size: clamp(2.1rem, 5vw, 3.5rem); letter-spacing: -.03em; }
    .aliases { margin: 0 0 26px; color: var(--muted); font-size: .83rem; }
    .definition { margin: 0 0 34px; padding: 18px 20px; border-left: 4px solid var(--green); background: var(--green-soft); font-size: 1.03rem; }
    .article h2 { margin: 34px 0 12px; padding-bottom: 7px; border-bottom: 1px solid var(--line); font-size: 1.32rem; }
    .article p { margin: 0 0 15px; }
    .article ul { margin: 0 0 18px; padding-left: 22px; }
    .article li { margin: 6px 0; }
    .fact-list {
      display: grid;
      gap: 9px;
      margin: 0 0 18px;
      padding-left: 20px;
      color: #37423a;
    }
    .fact-list li { padding-left: 4px; }
    .fact-list li::marker { color: var(--green); }
    .term-link { border: 0; border-bottom: 1px solid #8aa897; background: none; padding: 0; color: var(--green); cursor: pointer; font-weight: 700; }
    .glossary-term {
      position: relative;
      border-bottom: 1px dotted var(--green);
      color: #174b37;
      cursor: help;
      outline: none;
    }
    .glossary-term::after {
      content: attr(data-definition);
      position: absolute;
      z-index: 40;
      left: 0;
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: min(320px, calc(100vw - 40px));
      padding: 10px 12px;
      border-radius: 7px;
      background: #17221b;
      color: #f8faf8;
      box-shadow: 0 10px 28px rgba(10, 20, 14, .24);
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-size: .78rem;
      font-weight: 500;
      line-height: 1.55;
      letter-spacing: 0;
      white-space: normal;
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: opacity .14s ease, transform .14s ease, visibility .14s ease;
      pointer-events: none;
    }
    .glossary-term:hover::after,
    .glossary-term:focus::after {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .glossary-term:focus { border-bottom-style: solid; }
    .tooltip-hint {
      margin: -15px 0 25px;
      color: var(--muted);
      font-size: .76rem;
    }
    .aside { position: sticky; top: 88px; }
    .aside-box { border-top: 3px solid var(--green); background: var(--surface); padding: 18px; box-shadow: 0 8px 24px rgba(24,33,27,.05); }
    .aside-box h3 { margin: 0 0 12px; font-size: 1rem; }
    .related-list { display: grid; gap: 9px; }
    .related-list button { border: 0; background: none; padding: 0; text-align: left; color: var(--green); cursor: pointer; font-size: .87rem; }
    .source-box { margin-top: 16px; border-top-color: var(--blue); }
    .source-list { display: grid; gap: 9px; }
    .source-list a { color: var(--blue); font-size: .84rem; text-decoration: none; }
    .source-list a:hover { text-decoration: underline; }
    .paper-box { margin-top: 16px; border-top-color: var(--rust); }
    .paper-list { display: grid; gap: 9px; }
    .paper-list a { color: var(--rust); font-size: .82rem; line-height: 1.45; text-decoration: none; }
    .paper-list a:hover { text-decoration: underline; }
    .policy-note { margin-top: 18px; padding: 14px 16px; border: 1px solid var(--line); color: var(--muted); font-size: .78rem; }

    footer { border-top: 1px solid var(--line); padding: 24px 0 34px; color: var(--muted); font-size: .78rem; }
    footer .container { display: flex; justify-content: space-between; gap: 20px; }

    @media (max-width: 820px) {
      .topbar-inner { width: min(100% - 24px, 1180px); gap: 12px; }
      .brand { font-size: 1rem; }
      .keycap { display: none; }
      .container { width: min(100% - 28px, 1120px); }
      .hero { padding-top: 54px; }
      .category-grid { grid-template-columns: 1fr; }
      .category-card { min-height: 215px; }
      .concept-row { grid-template-columns: 1fr auto; }
      .concept-row p { grid-column: 1 / -1; grid-row: 2; }
      .article-layout { grid-template-columns: 1fr; gap: 20px; }
      .aside { position: static; }
      .search-summary { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 520px) {
      .topbar-inner { min-height: 58px; }
      .brand-domain { display: none; }
      .top-search input { height: 38px; }
      .hero h1 { font-size: 2.55rem; }
      .hero-search input { height: 56px; }
      .section-heading { align-items: flex-start; flex-direction: column; gap: 5px; }
      .category-card { padding: 21px; }
      .card-route { left: 21px; }
      .question-head, .concept-row { padding-left: 18px; padding-right: 18px; }
      .article { border-left: 0; border-right: 0; border-radius: 0; margin-left: -14px; margin-right: -14px; }
      footer .container { flex-direction: column; }
    }
  </style>
</head>

  <main id="app" tabindex="-1"></main>

    function createAnnotator() {

          const item = glossaryTerms[term.toLowerCase()];
          if (!item || seen.has(item.key)) return match;
          seen.add(item.key);
          return prefix + '<span class="glossary-term" tabindex="0" data-definition="' + esc(item.definition) + '">' + esc(term) + '</span>';
        });
      };

    function searchArticles(query, filter) {
      const q = query.trim().toLowerCase();
      if (!q) return [];

        const hay = articleText(a);
        const pos = hay.indexOf(q);
        if (pos < 0) return null;
        const titleHit = a.title.toLowerCase().includes(q) ? 3 : 0;
        const aliasHit = a.aliases.join(" ").toLowerCase().includes(q) ? 2 : 0;
        return { id: id, article: a, score: titleHit + aliasHit + 1 };
      }).filter(Boolean).sort(function (a, b) { return b.score - a.score || a.article.title.localeCompare(b.article.title); });

      document.title = a.title + " · Single-cell Epigenomics";
      const body = a.body.map(function (part) {
        const points = Array.isArray(part[1]) ? part[1] : part[1].replace(/\.\s+/g, ".||| ").split("|||").filter(Boolean);
        return '<section><h2>' + part[0] + '</h2><ul class="fact-list">' + points.map(function (point) { return "<li>" + annotateOnce(point.trim()) + "</li>"; }).join("") + "</ul></section>";
      }).join("");
      const related = a.related.filter(function (rid) { return articles[rid]; }).map(function (rid) {
        return '<button data-article="' + rid + '">' + articles[rid].title + ' →</button>';
      }).join("");
      const sources = getSources(id).map(function (source) {
        return '<a href="' + esc(source[1]) + '" target="_blank" rel="noopener noreferrer">' + esc(source[0]) + ' ↗</a>';
      }).join("");
      const papers = getPapers(id).map(function (paper) {
        return '<a href="' + esc(paper[1]) + '" target="_blank" rel="noopener noreferrer">' + esc(paper[0]) + ' ↗</a>';
      }).join("");
      app.innerHTML = '<div class="container"><nav class="breadcrumb"><button data-route="home">홈</button><span>›</span><button data-section="' + a.section + '">' + s.title + '</button><span>›</span>' + a.title + '</nav>' +
        '<div class="article-layout"><article class="article"><p class="eyebrow">' + s.title + '</p><h1>' + a.title + '</h1>' +
        '<p class="aliases">Aliases: ' + a.aliases.join(" · ") + '</p><p class="tooltip-hint">점선 용어: hover / focus → 한 줄 설명</p><p class="definition">' + annotateOnce(a.summary) + '</p>' + body + '</article>' +
        '<aside class="aside"><div class="aside-box"><h3>Related</h3><div class="related-list">' + related + '</div></div>' +
        (sources ? '<div class="aside-box source-box"><h3>Resources / External links</h3><div class="source-list">' + sources + '</div></div>' : '') +
        (papers ? '<div class="aside-box paper-box"><h3>Key papers</h3><div class="paper-list">' + papers + '</div></div>' : '') +
        '</aside></div></div>';
      window.scrollTo(0, 0);
    }

    function handleRoute() {
      const raw = window.location.hash.replace(/^#/, "");
      const parts = raw.split("/");
      if (!raw || raw === "home") return renderHome();
      if (parts[0] === "section") return renderSection(parts[1]);
      if (parts[0] === "article") return renderArticle(parts[1]);
      if (parts[0] === "search") return renderSearch(decodeURIComponent(parts.slice(1).join("/")));
      renderHome();
    }

    document.addEventListener("click", function (e) {
      const home = e.target.closest("[data-route='home']");
      const section = e.target.closest("[data-section]");
      const article = e.target.closest("[data-article]");
      const filter = e.target.closest("[data-filter]");
      if (home) route("home");
      else if (article) route("article/" + article.dataset.article);
      else if (section) route("section/" + section.dataset.section);
      else if (filter) { activeFilter = filter.dataset.filter; const q = decodeURIComponent(window.location.hash.split("/").slice(1).join("/")); renderSearch(q); }
    });

    document.getElementById("topSearchForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const q = topSearch.value.trim();
      if (q) { activeFilter = "all"; route("search/" + encodeURIComponent(q)); }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
        e.preventDefault(); topSearch.focus();
      }
    });
    window.addEventListener("hashchange", handleRoute);
    handleRoute();
  </script>
</body>
</html>
